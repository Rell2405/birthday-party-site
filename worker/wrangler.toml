name = "birthday-party-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Non-secret configuration. Secrets are set separately:
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put YOUTUBE_API_KEY
[vars]
DATA_REPO = "Rell2405/birthday-party-data"
DATA_BRANCH = "main"
# CORS allowlist. Comma-separated origins, or "*" for any.
# Production site origin + local dev server:
ALLOWED_ORIGIN = "https://rell2405.github.io,http://localhost:4321"
